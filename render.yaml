# Render Blueprint — deploys the API and the built UI as one Docker service.
# Render reads this automatically when you create a Blueprint from this repo.
#
# The two NVIDIA keys are marked sync:false, so Render prompts for them at
# deploy time and stores them as secrets. They are never committed here.
services:
  - type: web
    name: quran-rag
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    # liveness only: /healthz touches no dependency, so a slow upstream can
    # never make the platform restart a container that is actually fine
    healthCheckPath: /healthz
    envVars:
      # Data paths are deliberately NOT set here. The image already declares
      # correct absolute paths in its ENV block, and a blueprint value overrides
      # the image's — so a stale path here silently crashes the container at
      # import (this happened: these pointed at a previous WORKDIR).
      #
      # PORT is likewise left to Render, which injects its own; the container
      # binds ${PORT} and falls back to 7860 elsewhere.
      #
      # Pin CORS to the site's own origin so an arbitrary page cannot drive the
      # API against this deployment's key from a visitor's browser. Render
      # prompts for it; use the service URL, e.g. https://<name>.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false
      # set these in the Render dashboard (or when prompted on first deploy)
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_EMBED_API_KEY
        sync: false
