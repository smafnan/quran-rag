# Render Blueprint — deploys the API and the built UI as one Docker service.
# Render reads this automatically when you create a Blueprint from this repo.
#
# The two NVIDIA keys are marked sync:false, so Render prompts for them at
# deploy time and stores them as secrets. They are never committed here.
services:
  - type: web
    name: quran-rag
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    # liveness only: /healthz touches no dependency, so a slow upstream can
    # never make the platform restart a container that is actually fine
    healthCheckPath: /healthz
    envVars:
      # Data paths and PORT are deliberately NOT set here. The image declares the
      # correct absolute paths in its ENV block, and a blueprint value overrides
      # the image's — a stale path here would crash the container at import. PORT
      # is injected by Render; the container binds ${PORT}, falling back to 7860.
      #
      # Only the two NVIDIA keys are declared, as secrets. Nothing else is
      # `sync: false`: an unset required var can block a Blueprint deploy from
      # completing, and CORS already defaults to open (ALLOWED_ORIGINS is an
      # optional lock-down you can add in the dashboard, not a deploy gate).
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_EMBED_API_KEY
        sync: false
